[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.26.1 --prefer-offline || npm install -g pnpm@10.26.1",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
